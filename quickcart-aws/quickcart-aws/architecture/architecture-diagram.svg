<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="560" fill="#0f1115"/>

  <!-- Title -->
  <text x="500" y="35" fill="#ff9900" font-size="20" font-weight="bold" text-anchor="middle">QuickCart — Serverless Order Processing Architecture</text>

  <!-- User -->
  <circle cx="80" cy="120" r="24" fill="#232830" stroke="#444"/>
  <text x="80" y="126" fill="#eaeaea" font-size="11" text-anchor="middle">User</text>
  <text x="80" y="105" fill="#9aa0a6" font-size="10" text-anchor="middle">Browser</text>

  <!-- CloudFront -->
  <rect x="180" y="95" width="140" height="50" rx="8" fill="#1a2e1f" stroke="#3a6b45"/>
  <text x="250" y="115" fill="#eaeaea" font-size="12" text-anchor="middle">CloudFront</text>
  <text x="250" y="132" fill="#9aa0a6" font-size="10" text-anchor="middle">CDN</text>

  <!-- S3 -->
  <rect x="180" y="180" width="140" height="50" rx="8" fill="#1a2e1f" stroke="#3a6b45"/>
  <text x="250" y="200" fill="#eaeaea" font-size="12" text-anchor="middle">S3 Bucket</text>
  <text x="250" y="217" fill="#9aa0a6" font-size="10" text-anchor="middle">Static frontend</text>

  <!-- API Gateway -->
  <rect x="380" y="95" width="150" height="50" rx="8" fill="#241a2e" stroke="#6b3a8a"/>
  <text x="455" y="115" fill="#eaeaea" font-size="12" text-anchor="middle">API Gateway</text>
  <text x="455" y="132" fill="#9aa0a6" font-size="10" text-anchor="middle">POST /order · GET /orders</text>

  <!-- PlaceOrder Lambda -->
  <rect x="580" y="40" width="150" height="50" rx="8" fill="#2e2a1a" stroke="#8a7a3a"/>
  <text x="655" y="60" fill="#eaeaea" font-size="12" text-anchor="middle">Lambda</text>
  <text x="655" y="77" fill="#9aa0a6" font-size="10" text-anchor="middle">PlaceOrder</text>

  <!-- GetOrders Lambda -->
  <rect x="580" y="150" width="150" height="50" rx="8" fill="#2e2a1a" stroke="#8a7a3a"/>
  <text x="655" y="170" fill="#eaeaea" font-size="12" text-anchor="middle">Lambda</text>
  <text x="655" y="187" fill="#9aa0a6" font-size="10" text-anchor="middle">GetOrders</text>

  <!-- SQS -->
  <rect x="580" y="260" width="150" height="50" rx="8" fill="#2e1a1a" stroke="#8a3a3a"/>
  <text x="655" y="280" fill="#eaeaea" font-size="12" text-anchor="middle">SQS</text>
  <text x="655" y="297" fill="#9aa0a6" font-size="10" text-anchor="middle">OrderQueue</text>

  <!-- DLQ -->
  <rect x="800" y="260" width="140" height="50" rx="8" fill="#2e1a1a" stroke="#8a3a3a" stroke-dasharray="4"/>
  <text x="870" y="280" fill="#eaeaea" font-size="12" text-anchor="middle">SQS DLQ</text>
  <text x="870" y="297" fill="#9aa0a6" font-size="10" text-anchor="middle">After 3 failed tries</text>

  <!-- ProcessOrder Lambda -->
  <rect x="580" y="350" width="150" height="50" rx="8" fill="#2e2a1a" stroke="#8a7a3a"/>
  <text x="655" y="370" fill="#eaeaea" font-size="12" text-anchor="middle">Lambda</text>
  <text x="655" y="387" fill="#9aa0a6" font-size="10" text-anchor="middle">ProcessOrder</text>

  <!-- DynamoDB -->
  <rect x="580" y="440" width="150" height="50" rx="8" fill="#1a222e" stroke="#3a5a8a"/>
  <text x="655" y="460" fill="#eaeaea" font-size="12" text-anchor="middle">DynamoDB</text>
  <text x="655" y="477" fill="#9aa0a6" font-size="10" text-anchor="middle">Orders table</text>

  <!-- CloudWatch/SNS -->
  <rect x="800" y="440" width="150" height="50" rx="8" fill="#2e1a29" stroke="#8a3a7a"/>
  <text x="875" y="460" fill="#eaeaea" font-size="12" text-anchor="middle">CloudWatch + SNS</text>
  <text x="875" y="477" fill="#9aa0a6" font-size="10" text-anchor="middle">Alarms · Alerts</text>

  <!-- IAM/Budgets note -->
  <text x="500" y="540" fill="#9aa0a6" font-size="11" text-anchor="middle">IAM secures every service-to-service call · AWS Budgets monitors monthly spend and alerts via SNS</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <line x1="104" y1="115" x2="178" y2="115" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="250" y1="145" x2="250" y2="178" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="115" x2="378" y2="115" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="105" x2="578" y2="70" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="130" x2="578" y2="175" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="655" y1="90" x2="655" y2="258" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="285" x2="798" y2="285" stroke="#666" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrow)"/>
  <line x1="655" y1="310" x2="655" y2="348" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="655" y1="400" x2="655" y2="438" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="465" x2="798" y2="465" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
