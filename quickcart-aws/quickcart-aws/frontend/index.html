<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickCart — Serverless Demo Store</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --accent: #ff9900;
    --text: #eaeaea;
    --muted: #9aa0a6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 24px 40px;
    border-bottom: 1px solid #262b33;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { margin: 0; font-size: 22px; }
  header h1 span { color: var(--accent); }
  .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
  .products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
  }
  .product-card {
    background: var(--card);
    border: 1px solid #262b33;
    border-radius: 10px;
    padding: 18px;
  }
  .product-card h3 { margin: 0 0 6px; }
  .price { color: var(--accent); font-weight: bold; margin: 8px 0; }
  button {
    background: var(--accent);
    color: #111;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    width: 100%;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .status-box {
    margin-top: 40px;
    background: var(--card);
    border: 1px solid #262b33;
    border-radius: 10px;
    padding: 20px;
  }
  .status-box h2 { margin-top: 0; font-size: 18px; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid #262b33; font-size: 14px; }
  th { color: var(--muted); font-weight: 500; }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .pending { background: #4a3a12; color: #ffcf6b; }
  .processing { background: #123a4a; color: #6bc7ff; }
  .completed { background: #123a1e; color: #6bffa3; }
  .failed { background: #4a1212; color: #ff6b6b; }
  #configNotice {
    background: #2a1f10;
    border: 1px solid #5a4322;
    color: #ffcf6b;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .muted { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<header>
  <h1>Quick<span>Cart</span></h1>
  <span class="muted">Serverless order demo · AWS</span>
</header>

<div class="container">

  <div id="configNotice">
    ⚠️ Set your API Gateway URL in <code>app.js</code> (the <code>API_URL</code> constant) before this will work.
  </div>

  <div class="products" id="products"></div>

  <div class="status-box">
    <h2>Recent Orders</h2>
    <p class="muted">Pulled live from DynamoDB via API Gateway → Lambda.</p>
    <table>
      <thead>
        <tr><th>Order ID</th><th>Item</th><th>Status</th><th>Placed At</th></tr>
      </thead>
      <tbody id="ordersBody">
        <tr><td colspan="4" class="muted">No orders yet — place one above.</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
